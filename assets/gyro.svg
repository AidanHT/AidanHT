<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" role="img" aria-label="Animated gyroscope">
  <defs>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#64ffda"/>
      <stop offset="1" stop-color="#4f9cf9"/>
    </linearGradient>
    <filter id="g2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid2" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#dfe7ef" stroke-width="0.6" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="300" height="300" rx="18" fill="#0a0e14"/>
  <rect width="300" height="300" fill="url(#grid2)"/>
  <rect x="0.5" y="0.5" width="299" height="299" rx="18" fill="none" stroke="#1b2632"/>
  <g filter="url(#g2)">
  <g transform="rotate(0 150.0 150.0)">
      <ellipse cx="150.0" cy="150.0" rx="96" ry="34" fill="none" stroke="#dfe7ef" stroke-width="1" opacity="0.30">
        <animate attributeName="rx" values="96;6;96" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.30;0.12;0.30" dur="8s" repeatCount="indefinite"/>
      </ellipse>
      <circle r="4.5" fill="#64ffda">
        <animateMotion dur="8s" repeatCount="indefinite"
          path="M 54.0 150.0 a 96 34 0 1 1 192 0 a 96 34 0 1 1 -192 0"/>
      </circle>
    </g><g transform="rotate(60 150.0 150.0)">
      <ellipse cx="150.0" cy="150.0" rx="96" ry="34" fill="none" stroke="#dfe7ef" stroke-width="1" opacity="0.30">
        <animate attributeName="rx" values="96;6;96" dur="9.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.30;0.12;0.30" dur="9.5s" repeatCount="indefinite"/>
      </ellipse>
      <circle r="4.5" fill="#4f9cf9">
        <animateMotion dur="9.5s" repeatCount="indefinite"
          path="M 54.0 150.0 a 96 34 0 1 1 192 0 a 96 34 0 1 1 -192 0"/>
      </circle>
    </g><g transform="rotate(120 150.0 150.0)">
      <ellipse cx="150.0" cy="150.0" rx="96" ry="34" fill="none" stroke="#dfe7ef" stroke-width="1" opacity="0.30">
        <animate attributeName="rx" values="96;6;96" dur="8.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.30;0.12;0.30" dur="8.7s" repeatCount="indefinite"/>
      </ellipse>
      <circle r="4.5" fill="#a78bfa">
        <animateMotion dur="8.7s" repeatCount="indefinite"
          path="M 54.0 150.0 a 96 34 0 1 1 192 0 a 96 34 0 1 1 -192 0"/>
      </circle>
    </g>
  <circle cx="150.0" cy="150.0" r="6.5" fill="#64ffda">
    <animate attributeName="r" values="6.5;9;6.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.55;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  </g>
  <g fill="#5b6b7d" font-family="ui-monospace,monospace" font-size="9" opacity="0.6">
    <text x="14" y="22">// state space</text>
    <text x="286" y="286" text-anchor="end">∮ orbit · dt</text>
  </g>
</svg>